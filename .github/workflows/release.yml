name: release

# Build the Electron desktop app on every version tag and publish the installers
# to a GitHub Release. Signing and notarization are gated on repository secrets:
# with none set, the build still succeeds and produces unsigned installers; set
# the secrets to sign (and, for macOS, notarize) automatically.
#
# Secrets (set later in repo Settings -> Secrets and variables -> Actions):
#   CSC_LINK                     base64 of the signing cert (.p12), macOS and Windows
#   CSC_KEY_PASSWORD             password for that cert
#   APPLE_ID                     Apple ID email          (macOS notarization)
#   APPLE_APP_SPECIFIC_PASSWORD app-specific password    (macOS notarization)
#   APPLE_TEAM_ID                Apple Developer team id  (macOS notarization)
# To enable macOS notarization, also set mac.notarize to true in
# apps/web/electron-builder.yml.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # A lockfile generated on one OS omits the other platforms' Rollup optional
      # binary (npm/cli#4828), so npm ci fails on the Linux and Windows runners.
      # A fresh resolve installs the platform-correct binaries. shell: bash makes
      # rm -rf work on the Windows runner too. Matches ci.yml.
      - name: Install
        env:
          # youtube-dl-exec's postinstall fetches yt-dlp through the GitHub API, which
          # hits the 60/hr anonymous limit on shared runner IPs (and its token handling
          # is broken). Skip it here and fetch the binary directly in the next step.
          YOUTUBE_DL_SKIP_DOWNLOAD: 'true'
        # npm ci gives a complete, deterministic install (a fresh resolve dropped
        # 7zip-bin's binaries on the runners). The lockfile carries every OS's Rollup
        # native binary via optionalDependencies, so this resolves on all three.
        run: npm ci
      - name: Fetch the yt-dlp binary
        shell: bash
        # Standalone builds (no Python runtime needed) pulled straight from the release
        # CDN, so no API rate limit. Placed where youtube-dl-exec expects it; asarUnpack
        # keeps it runnable in the packaged app.
        run: |
          BIN=node_modules/youtube-dl-exec/bin
          mkdir -p "$BIN"
          base=https://github.com/yt-dlp/yt-dlp/releases/latest/download
          case "$RUNNER_OS" in
            Windows) curl -fL --retry 5 --retry-all-errors -o "$BIN/yt-dlp.exe" "$base/yt-dlp.exe" ;;
            macOS)   curl -fL --retry 5 --retry-all-errors -o "$BIN/yt-dlp" "$base/yt-dlp_macos" && chmod +x "$BIN/yt-dlp" ;;
            Linux)   curl -fL --retry 5 --retry-all-errors -o "$BIN/yt-dlp" "$base/yt-dlp_linux" && chmod +x "$BIN/yt-dlp" ;;
          esac
      # The signing secrets are a macOS Developer ID cert, so they only apply to the
      # macOS job (which signs and notarizes). Windows and Linux publish unsigned --
      # passing them there just makes electron-builder try to sign with a Mac cert.
      - name: Build and publish (macOS, signed + notarized)
        if: matrix.os == 'macos-latest'
        run: npm --workspace @doot-games/web run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Build and publish (Windows/Linux, unsigned)
        if: matrix.os != 'macos-latest'
        run: npm --workspace @doot-games/web run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
