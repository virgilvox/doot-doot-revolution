name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install, not npm ci: a macOS-generated lockfile omits the Linux Rollup
      # optional binary (npm/cli#4828), and strict `npm ci` then fails on the runner.
      # `npm install` re-resolves the platform-correct binary, matching the deploy.
      - run: npm install
      - name: Package tests
        run: npm test
      - name: Web tests
        run: npm run test:web
      - name: Web build
        run: npm run build
