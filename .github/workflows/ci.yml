name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Every OS's Rollup native binary is declared as an optionalDependency in the
      # root package.json, so the lockfile carries all platforms and npm ci resolves
      # the Linux one here (works around npm/cli#4828).
      - run: npm ci
      - name: Package tests
        run: npm test
      - name: Web tests
        run: npm run test:web
      - name: Web build
        run: npm run build
