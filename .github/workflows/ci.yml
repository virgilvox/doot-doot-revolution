name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # A lockfile generated on macOS omits the Linux Rollup optional binary
      # (npm/cli#4828); with the lockfile present npm never resolves it, so both
      # `npm ci` and a plain `npm install` fail on the runner with
      # "Cannot find module @rollup/rollup-linux-x64-gnu". Removing the lockfile
      # first forces a fresh, platform-correct resolve. This matches the deploy.
      - run: rm -rf node_modules package-lock.json && npm install
      - name: Package tests
        run: npm test
      - name: Web tests
        run: npm run test:web
      - name: Web build
        run: npm run build
