appId: com.dootgames.dootdootrevolution
productName: Doot Doot Revolution
directories:
  output: release/${version}
files:
  - dist
  - dist-electron
asar: true
# There are no native node modules to rebuild, and on a hoisted npm workspace this
# step reinstalls production deps into the shared root node_modules, pruning the dev
# deps electron-builder itself needs (e.g. 7zip-bin) and failing the build. Skip it.
npmRebuild: false
# the yt-dlp binary (youtube-dl-exec) must stay outside the asar archive so it can be
# executed as a real file in a packaged build
asarUnpack:
  - "**/node_modules/youtube-dl-exec/bin/**"

# Code signing happens automatically when the platform cert is present in the
# environment (CSC_LINK plus CSC_KEY_PASSWORD, set as CI secrets). With no cert
# the build still succeeds, unsigned. macOS notarization is opt in: set
# mac.notarize below to true and provide the APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD
# / APPLE_TEAM_ID secrets.
mac:
  target:
    - target: dmg
      arch: [arm64, x64]        # Apple Silicon and Intel
  artifactName: DootDootRevolution-${version}-mac-${arch}.${ext}
  category: public.app-category.games
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # notarytool needs the team id explicitly; the boolean form does not pick it up from
  # APPLE_TEAM_ID. The team id is not secret (it is embedded in every signed build).
  # APPLE_ID and APPLE_APP_SPECIFIC_PASSWORD still come from the job env.
  notarize:
    teamId: '48CAD95Y7R'

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: DootDootRevolution-${version}-win-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target: [AppImage]
  category: Game
  artifactName: DootDootRevolution-${version}-linux-${arch}.${ext}

publish:
  provider: github
  owner: virgilvox
  repo: doot-doot-revolution
