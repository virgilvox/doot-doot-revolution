# DigitalOcean App Platform spec for the web build. The app is a static SPA:
# DigitalOcean runs the build at the repo root and serves apps/web/dist. Hash
# routing means no server rewrites are needed, and catchall_document is set so the
# deploy still works if routing is ever switched to history mode.
#
# Deploy: doctl apps create --spec .do/app.yaml  (or import this file in the
# DigitalOcean dashboard). Update the github.repo/branch to your fork if needed.
name: doot-doot-revolution
region: nyc
static_sites:
  - name: web
    github:
      repo: virgilvox/doot-doot-revolution
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    output_dir: apps/web/dist
    index_document: index.html
    catchall_document: index.html
    routes:
      - path: /
